name: Compile

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 2.1.818

      - name: Restore dependencies
        run: dotnet restore ./dvcsharp-core-api.csproj

      - name: Build
        run: dotnet build ./dvcsharp-core-api.csproj --configuration Release --no-restore
