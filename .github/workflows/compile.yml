name: Fortify FoD Scan and Aviator Auto Remediation

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  security-events: write

concurrency:
  group: fortify-${{ github.workflow }}-${{ github.head_ref || github.ref_name || github.run_id }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ./dvcsharp-core-api.csproj

      - name: Build application binaries for FoD packaging
        run: dotnet build ./dvcsharp-core-api.csproj --configuration Release --no-restore

      - name: Run FoD SAST, SCA, and Aviator scan
        uses: fortify/github-action@v3
        env:
          FOD_URL: ${{ vars.FOD_URL || 'https://ams.fortify.com' }}
          FOD_CLIENT_ID: ${{ secrets.FOD_CLIENT_ID }}
          FOD_CLIENT_SECRET: ${{ secrets.FOD_CLIENT_SECRET }}
          FOD_TENANT: ${{ vars.FOD_TENANT || '' }}
          FOD_RELEASE: ${{ format('{0}:{1}', github.repository, github.head_ref || github.ref_name) }}
          DO_SETUP: ${{ vars.FOD_DO_SETUP || 'true' }}
          SAST_ASSESSMENT_TYPE: ${{ vars.FOD_SAST_ASSESSMENT_TYPE || '' }}
          DO_AVIATOR_AUDIT: ${{ vars.FOD_DO_AVIATOR_AUDIT || 'true' }}
          OVERRIDE_SAST_SETTINGS: ${{ vars.FOD_OVERRIDE_SAST_SETTINGS || 'false' }}
          SETUP_EXTRA_OPTS: ${{ vars.FOD_SETUP_EXTRA_OPTS || '' }}
          FCLI_BOOTSTRAP_VERSION: ${{ vars.FCLI_BOOTSTRAP_VERSION || '' }}
          PACKAGE_EXTRA_OPTS: ${{ vars.FOD_PACKAGE_EXTRA_OPTS || '-bt dotnet -bf dvcsharp-core-api.csproj' }}
          DO_SAST_SCAN: 'true'
          DO_SCA_SCAN: 'true'
          DO_WAIT: ${{ vars.FOD_DO_WAIT || 'true' }}
          DO_SAST_WAIT: ${{ vars.FOD_DO_WAIT || 'true' }}
          DO_JOB_SUMMARY: ${{ vars.FOD_DO_JOB_SUMMARY || 'false' }}
          DO_RELEASE_SUMMARY: ${{ vars.FOD_DO_JOB_SUMMARY || 'false' }}
          DO_EXPORT: 'false'
          DO_SAST_EXPORT: 'false'
          DO_PR_COMMENT: ${{ github.event_name == 'pull_request' }}

  remediate:
    needs: scan
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup fcli
        uses: fortify/github-action/setup@v3
        with:
          fcli: 3.18.0

      - name: Login to FoD
        run: |
          fcli fod session login \
            --url "${{ vars.FOD_URL }}" \
            --tenant "${{ vars.FOD_TENANT }}" \
            --client-id "${{ secrets.FOD_CLIENT_ID }}" \
            --client-secret "${{ secrets.FOD_CLIENT_SECRET }}"

      - name: Resolve FoD scan and release IDs
        id: fod
        env:
          FOD_APP_NAME: ${{ github.repository }}
          FOD_RELEASE_NAME: ${{ github.ref_name }}
          FOD_SCAN_CANDIDATES_FILE: ${{ runner.temp }}/fod-scan-candidates.json
        run: |
          python <<'PY'
          import json
          import os
          import subprocess
          import sys

          app_name = os.environ["FOD_APP_NAME"]
          release_name = os.environ["FOD_RELEASE_NAME"]
          candidates_file = os.environ["FOD_SCAN_CANDIDATES_FILE"]

          completed = subprocess.run(
              ["fcli", "fod", "app", "list-scans", "--app", app_name, "-o", "json"],
              capture_output=True,
              text=True,
          )
          if completed.returncode != 0:
              sys.stderr.write(completed.stderr or completed.stdout)
              raise SystemExit(completed.returncode)

          payload = json.loads(completed.stdout)
          if isinstance(payload, dict):
              items = payload.get("items") or payload.get("records") or payload.get("data") or []
          else:
              items = payload

          if not isinstance(items, list):
              raise SystemExit(f"Unexpected FoD scan list payload: {json.dumps(payload)[:1000]}")

          def nested_get(item, *path):
              current = item
              for key in path:
                  if not isinstance(current, dict):
                      return None
                  current = current.get(key)
              return current

          def scan_release_name(item):
              for candidate in (
                  item.get("releaseName"),
                  item.get("release", {}).get("name") if isinstance(item.get("release"), dict) else None,
                  item.get("release", {}).get("releaseName") if isinstance(item.get("release"), dict) else None,
                  nested_get(item, "release", "release", "name"),
              ):
                  if candidate:
                      return str(candidate).strip()
              return ""

          def scan_release_id(item):
              for candidate in (
                  item.get("releaseId"),
                  item.get("release", {}).get("releaseId") if isinstance(item.get("release"), dict) else None,
                  item.get("release", {}).get("id") if isinstance(item.get("release"), dict) else None,
                  nested_get(item, "release", "releaseId"),
                  nested_get(item, "release", "id"),
              ):
                  if candidate is not None and str(candidate).strip():
                      return str(candidate).strip()
              return ""

          def scan_id(item):
              for candidate in (
                  item.get("scanId"),
                  item.get("id"),
                  item.get("scan", {}).get("scanId") if isinstance(item.get("scan"), dict) else None,
                  nested_get(item, "scan", "id"),
              ):
                  if candidate is not None and str(candidate).strip():
                      return str(candidate).strip()
              return ""

          def scan_timestamp(item):
              for candidate in (
                  item.get("completedDate"),
                  item.get("completionDate"),
                  item.get("modifiedDate"),
                  item.get("updatedDate"),
                  item.get("analysisDate"),
                  item.get("scanDate"),
                  item.get("createdDate"),
                  nested_get(item, "scan", "completedDate"),
                  nested_get(item, "scan", "modifiedDate"),
              ):
                  if candidate:
                      return str(candidate)
              return ""

          candidates = []
          for item in items:
              item_release_name = scan_release_name(item)
              item_release_id = scan_release_id(item)
              item_scan_id = scan_id(item)
              if item_release_name != release_name or not item_release_id or not item_scan_id:
                  continue
              candidates.append(
                  {
                      "scan_id": item_scan_id,
                      "release_id": item_release_id,
                      "release_name": item_release_name,
                      "timestamp": scan_timestamp(item),
                  }
              )

          if not candidates:
              sample = [
                  {
                      "scan_id": scan_id(item),
                      "release_id": scan_release_id(item),
                      "release_name": scan_release_name(item),
                      "timestamp": scan_timestamp(item),
                  }
                  for item in items[:5]
              ]
              raise SystemExit(
                  f"No FoD scans found for app '{app_name}' and release '{release_name}'. "
                  f"Sample scan records: {json.dumps(sample)}"
              )

          def sort_key(candidate):
              try:
                  scan_num = int(candidate["scan_id"])
              except ValueError:
                  scan_num = -1
              return (candidate["timestamp"], scan_num)

          candidates.sort(key=sort_key, reverse=True)

          with open(candidates_file, "w", encoding="utf-8") as fh:
              json.dump(candidates, fh)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"scan_id={candidates[0]['scan_id']}\n")
              fh.write(f"release_id={candidates[0]['release_id']}\n")
              fh.write(f"scan_count={len(candidates)}\n")
          PY

      - name: Apply Aviator remediations from FoD
        id: apply
        env:
          FOD_SCAN_CANDIDATES_FILE: ${{ runner.temp }}/fod-scan-candidates.json
        run: |
          python <<'PY' > "$RUNNER_TEMP/fod-scan-candidates.txt"
          import json
          import os

          with open(os.environ["FOD_SCAN_CANDIDATES_FILE"], "r", encoding="utf-8") as fh:
              candidates = json.load(fh)

          for candidate in candidates:
              print(f"{candidate['scan_id']} {candidate['release_id']}")
          PY

          set +e
          while read -r scan_id release_id; do
            [ -n "$scan_id" ] || continue
            echo "Trying FoD scan ${scan_id} on release ${release_id}"

            fcli fod aviator apply-remediations \
              --rel "${release_id}" \
              --source-dir "$GITHUB_WORKSPACE" \
              2>&1 | tee "$RUNNER_TEMP/fod-aviator-remediation.log"
            status=${PIPESTATUS[0]}

            if [ "$status" -eq 0 ]; then
              echo "remediations_available=true" >> "$GITHUB_OUTPUT"
              echo "selected_scan_id=${scan_id}" >> "$GITHUB_OUTPUT"
              echo "selected_release_id=${release_id}" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if grep -q "does not contain remediations.xml file" "$RUNNER_TEMP/fod-aviator-remediation.log"; then
              echo "FoD scan ${scan_id} did not contain remediations.xml; trying an older scan."
              continue
            fi

            exit "$status"
          done < "$RUNNER_TEMP/fod-scan-candidates.txt"
          set -e

          echo "No Aviator remediation bundle was available for any FoD scan on release ${GITHUB_REF_NAME}."
          echo "remediations_available=false" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Check whether remediation changed files
        id: changes
        if: steps.apply.outputs.remediations_available != 'false'
        run: |
          if git diff --quiet; then
            echo "No remediation changes were generated."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Remediation changes detected."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git diff --stat
          fi

      - name: Validate Git diff
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git diff --check

      - name: Detect project type
        if: steps.changes.outputs.has_changes == 'true'
        id: project
        run: |
          if [ -f "pom.xml" ]; then
            echo "type=maven" >> "$GITHUB_OUTPUT"
          elif [ -f "package.json" ]; then
            echo "type=node" >> "$GITHUB_OUTPUT"
          elif [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
            echo "type=gradle" >> "$GITHUB_OUTPUT"
          elif [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; then
            echo "type=python" >> "$GITHUB_OUTPUT"
          elif ls *.csproj >/dev/null 2>&1 || ls *.sln >/dev/null 2>&1; then
            echo "type=dotnet" >> "$GITHUB_OUTPUT"
          else
            echo "type=unknown" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Maven tests
        if: steps.changes.outputs.has_changes == 'true' && steps.project.outputs.type == 'maven'
        run: |
          mvn test

      - name: Run Node.js tests
        if: steps.changes.outputs.has_changes == 'true' && steps.project.outputs.type == 'node'
        run: |
          npm ci
          npm test

      - name: Run Gradle tests
        if: steps.changes.outputs.has_changes == 'true' && steps.project.outputs.type == 'gradle'
        run: |
          chmod +x ./gradlew || true
          if [ -f "./gradlew" ]; then
            ./gradlew test
          else
            gradle test
          fi

      - name: Run Python tests
        if: steps.changes.outputs.has_changes == 'true' && steps.project.outputs.type == 'python'
        run: |
          python -m pip install --upgrade pip
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          fi
          if [ -f "pyproject.toml" ]; then
            pip install .
          fi
          python -m pytest

      - name: Run .NET build
        if: steps.changes.outputs.has_changes == 'true' && steps.project.outputs.type == 'dotnet'
        run: |
          dotnet build ./dvcsharp-core-api.csproj --configuration Release

      - name: Fail if project type is unknown
        if: steps.changes.outputs.has_changes == 'true' && steps.project.outputs.type == 'unknown'
        run: |
          echo "Project type could not be detected."
          echo "Add a custom test step before creating the remediation pull request."
          exit 1

      - name: Create remediation pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Apply Fortify Aviator remediations"
          branch: fortify/aviator-remediation-${{ github.run_id }}
          delete-branch: true
          title: "Apply Fortify FoD Aviator remediations"
          body: |
            Fortify Aviator generated source-code remediation changes from the FoD release:

            Application: ${{ github.repository }}
            Release: ${{ github.ref_name }}
            FoD Scan ID: ${{ steps.apply.outputs.selected_scan_id || steps.fod.outputs.scan_id }}
            FoD Release ID: ${{ steps.apply.outputs.selected_release_id || steps.fod.outputs.release_id }}

            Automated validation completed before this PR was created:
            - Git diff validation
            - Project type detection
            - Unit or build test execution

            Please review, build, test, and rescan before merging.
