name: Fortify FoD Scan and Aviator Remediation

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE'
      - '.gitignore'
      - 'provisioning'
      - '.sonarcloud.properties'
      - 'LICENSE'
      - 'Vagrantfile'
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE'
      - '.gitignore'
      - 'provisioning'
      - '.sonarcloud.properties'
      - 'LICENSE'
      - 'Vagrantfile'
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to scan and remediate; leave blank to use the selected branch
        required: false
        default: ''

concurrency:
  group: fortify-${{ github.workflow }}-${{ github.head_ref || github.ref_name || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ./dvcsharp-core-api.csproj

      - name: Build
        run: dotnet build ./dvcsharp-core-api.csproj --configuration Release --no-restore

  resolve-pr-context:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      has_pr_context: ${{ steps.resolve.outputs.has_pr_context }}
      is_same_repo_pr: ${{ steps.resolve.outputs.is_same_repo_pr }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      base_ref: ${{ steps.resolve.outputs.base_ref }}
      run_remediation: ${{ steps.resolve.outputs.run_remediation }}
    steps:
      - id: resolve
        name: Resolve PR context
        env:
          GH_TOKEN: ${{ github.token }}
          GH_API_URL: ${{ github.api_url }}
          WORKFLOW_DISPATCH_BRANCH: ${{ github.event.inputs.branch || '' }}
        run: |
          python <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          with open(os.environ["GITHUB_EVENT_PATH"], "r", encoding="utf-8") as fh:
              payload = json.load(fh)

          repo_full_name = os.environ["GITHUB_REPOSITORY"]
          owner, repo = repo_full_name.split("/", 1)
          event_name = os.environ["GITHUB_EVENT_NAME"]
          github_ref = os.environ.get("GITHUB_REF", "")
          checkout_ref = os.environ.get("GITHUB_SHA", "")
          default_branch = payload.get("repository", {}).get("default_branch") or "main"
          manual_branch = os.environ.get("WORKFLOW_DISPATCH_BRANCH", "").strip()
          pr = None

          if github_ref.startswith("refs/heads/"):
              base_ref = github_ref[len("refs/heads/"):]
          else:
              base_ref = default_branch

          def github_get(path: str) -> dict:
              request = urllib.request.Request(
                  f"{os.environ['GH_API_URL'].rstrip('/')}{path}",
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              try:
                  with urllib.request.urlopen(request) as response:
                      return json.load(response)
              except urllib.error.HTTPError as exc:
                  details = exc.read().decode("utf-8", errors="replace")
                  print(f"Failed to query GitHub API at {path}: {details}", file=sys.stderr)
                  raise

          if event_name == "pull_request":
              pr = payload.get("pull_request")
              if pr:
                  checkout_ref = pr["head"]["sha"]
                  base_ref = pr["base"]["ref"]
          elif event_name == "workflow_dispatch":
              branch = manual_branch or base_ref
              encoded_branch = urllib.parse.quote(branch, safe="")
              branch_data = github_get(f"/repos/{owner}/{repo}/branches/{encoded_branch}")
              checkout_ref = branch_data["commit"]["sha"]
              base_ref = branch

          has_pr_context = pr is not None
          outputs = {
              "has_pr_context": str(has_pr_context).lower(),
              "pr_number": str(pr["number"]) if has_pr_context else "",
              "checkout_ref": checkout_ref,
              "base_ref": base_ref,
              "run_remediation": str(bool(base_ref)).lower(),
              "is_same_repo_pr": str(
                  pr["head"]["repo"]["full_name"] == repo_full_name if has_pr_context else True
              ).lower(),
          }

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              for key, value in outputs.items():
                  fh.write(f"{key}={value}\n")
          PY

  fortify-fod:
    needs: [build, resolve-pr-context]
    if: needs.resolve-pr-context.outputs.is_same_repo_pr == 'true'
    name: fortify-fod
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
      security-events: write
    outputs:
      release_id: ${{ steps.resolve-release.outputs.release-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-pr-context.outputs.checkout_ref || github.sha }}

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ./dvcsharp-core-api.csproj

      - name: Build application binaries for FoD packaging
        run: dotnet build ./dvcsharp-core-api.csproj --configuration Release --no-restore

      - name: Run Fortify on Demand scan
        uses: appsecai-source/fortify-aviator-remediation-action/fod-scan@main
        with:
          fod-url: ${{ vars.FOD_URL || 'https://ams.fortify.com' }}
          fod-client-id: ${{ secrets.FOD_CLIENT_ID }}
          fod-client-secret: ${{ secrets.FOD_CLIENT_SECRET }}
          fod-tenant: ${{ secrets.FOD_TENANT || '' }}
          fod-release: ${{ vars.FOD_RELEASE || format('{0}:{1}', github.repository, needs.resolve-pr-context.outputs.base_ref) }}
          do-setup: ${{ vars.FOD_DO_SETUP || 'true' }}
          fod-app-owner: ${{ vars.FOD_APP_OWNER || '' }}
          #auto-required-attrs: ${{ vars.FOD_AUTO_REQUIRED_ATTRS || 'true' }}
          copy-from-release: ${{ vars.FOD_COPY_FROM_RELEASE || '' }}
          sast-assessment-type: ${{ vars.FOD_SAST_ASSESSMENT_TYPE || '' }}
          do-aviator-audit: ${{ vars.FOD_DO_AVIATOR_AUDIT || 'true' }}
          override-sast-settings: ${{ vars.FOD_OVERRIDE_SAST_SETTINGS || 'false' }}
          package-extra-opts: ${{ vars.FOD_PACKAGE_EXTRA_OPTS || '-bt dotnet -bf dvcsharp-core-api.csproj' }}
          do-wait: 'false'
          do-job-summary: ${{ vars.FOD_DO_JOB_SUMMARY || 'false' }}
          do-export: 'false'
          do-sca-scan: 'true'
          do-pr-comment: ${{ github.event_name == 'pull_request' }}

      - name: Resolve FoD release id
        id: resolve-release
        env:
          FOD_BASE_URL: ${{ vars.FOD_BASE_URL || 'https://api.ams.fortify.com' }}
          FOD_CLIENT_ID: ${{ secrets.FOD_CLIENT_ID }}
          FOD_CLIENT_SECRET: ${{ secrets.FOD_CLIENT_SECRET }}
          FOD_TENANT: ${{ secrets.FOD_TENANT || '' }}
          FOD_OAUTH_SCOPE: ${{ vars.FOD_OAUTH_SCOPE || 'api-tenant' }}
          FOD_RELEASE_NAME: ${{ vars.FOD_RELEASE || format('{0}:{1}', github.repository, needs.resolve-pr-context.outputs.base_ref) }}
        run: |
          python <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          base_url = os.environ["FOD_BASE_URL"].rstrip("/")
          release_name = os.environ["FOD_RELEASE_NAME"].strip()
          client_id = os.environ["FOD_CLIENT_ID"]
          client_secret = os.environ["FOD_CLIENT_SECRET"]
          oauth_scope = os.environ.get("FOD_OAUTH_SCOPE", "api-tenant")

          if not release_name:
              raise SystemExit("FOD release name is empty; cannot resolve release id.")

          token_form = {
              "grant_type": "client_credentials",
              "scope": oauth_scope,
              "client_id": client_id,
              "client_secret": client_secret,
          }
          token_request = urllib.request.Request(
              f"{base_url}/oauth/token",
              data=urllib.parse.urlencode(token_form).encode("utf-8"),
              headers={"Content-Type": "application/x-www-form-urlencoded", "Accept": "application/json"},
          )

          try:
              with urllib.request.urlopen(token_request) as response:
                  token_payload = json.load(response)
          except urllib.error.HTTPError as exc:
              details = exc.read().decode("utf-8", errors="replace")
              raise SystemExit(f"FoD authentication failed while resolving release id: {details}") from exc

          access_token = token_payload.get("access_token")
          if not access_token:
              raise SystemExit("FoD authentication succeeded but no access_token was returned.")

          target_parts = release_name.split(":")
          target_app = target_parts[0].strip() if len(target_parts) >= 2 else ""
          target_release = target_parts[-1].strip()
          target_microservice = target_parts[1].strip() if len(target_parts) == 3 else ""

          def build_candidates(item: dict) -> set[str]:
              candidates = set()
              application_name = (
                  item.get("applicationName")
                  or item.get("application", {}).get("applicationName")
                  or item.get("application", {}).get("name")
                  or ""
              )
              microservice_name = (
                  item.get("microserviceName")
                  or item.get("microservice", {}).get("microserviceName")
                  or item.get("microservice", {}).get("name")
                  or ""
              )
              current_release_name = item.get("releaseName") or item.get("name") or ""

              for value in (current_release_name, item.get("releaseFullName"), item.get("displayName")):
                  if value:
                      candidates.add(str(value).strip())
              if application_name and current_release_name:
                  candidates.add(f"{application_name}:{current_release_name}")
              if application_name and microservice_name and current_release_name:
                  candidates.add(f"{application_name}:{microservice_name}:{current_release_name}")
              return {candidate for candidate in candidates if candidate}

          offset = 0
          limit = 100
          matched_release_id = None
          sampled_items: list[dict] = []

          while True:
              query = urllib.parse.urlencode({"offset": offset, "limit": limit})
              releases_request = urllib.request.Request(
                  f"{base_url}/api/v3/releases?{query}",
                  headers={
                      "Accept": "application/json",
                      "Authorization": f"Bearer {access_token}",
                  },
              )
              try:
                  with urllib.request.urlopen(releases_request) as response:
                      payload = json.load(response)
              except urllib.error.HTTPError as exc:
                  details = exc.read().decode("utf-8", errors="replace")
                  raise SystemExit(f"FoD release lookup failed: {details}") from exc

              items = payload.get("items") if isinstance(payload, dict) else payload
              if not isinstance(items, list):
                  raise SystemExit(f"Unexpected FoD releases payload shape: {json.dumps(payload)[:800]}")
              if not items:
                  break

              if not sampled_items:
                  sampled_items = items[:3]

              for item in items:
                  candidates = build_candidates(item)
                  if release_name in candidates:
                      matched_release_id = item.get("releaseId") or item.get("id")
                  else:
                      item_release = (item.get("releaseName") or item.get("name") or "").strip()
                      item_app = (
                          item.get("applicationName")
                          or item.get("application", {}).get("applicationName")
                          or item.get("application", {}).get("name")
                          or ""
                      ).strip()
                      item_microservice = (
                          item.get("microserviceName")
                          or item.get("microservice", {}).get("microserviceName")
                          or item.get("microservice", {}).get("name")
                          or ""
                      ).strip()
                      if item_release == target_release and (
                          not target_app or item_app == target_app
                      ) and (
                          not target_microservice or item_microservice == target_microservice
                      ):
                          matched_release_id = item.get("releaseId") or item.get("id")

                  if matched_release_id:
                      with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
                          fh.write(f"release-id={matched_release_id}\n")
                      raise SystemExit(0)

              total_count = payload.get("totalCount") if isinstance(payload, dict) else None
              offset += len(items)
              if total_count is not None and offset >= int(total_count):
                  break

          sample = []
          for item in sampled_items:
              sample.append(
                  {
                      "releaseId": item.get("releaseId") or item.get("id"),
                      "applicationName": item.get("applicationName") or item.get("application", {}).get("name"),
                      "microserviceName": item.get("microserviceName") or item.get("microservice", {}).get("name"),
                      "releaseName": item.get("releaseName") or item.get("name"),
                  }
              )
          raise SystemExit(
              "Unable to resolve FoD release id for "
              f"{release_name}. Sample releases returned by FoD: {json.dumps(sample)}"
          )
          PY

  fortify-aviator-remediation:
    needs: [resolve-pr-context, fortify-fod]
    if: needs.resolve-pr-context.outputs.run_remediation == 'true' && needs.resolve-pr-context.outputs.is_same_repo_pr == 'true' && needs.fortify-fod.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-pr-context.outputs.checkout_ref }}

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run Fortify Aviator remediation action
        uses: appsecai-source/fortify-aviator-remediation-action@main
        with:
          fod-base-url: ${{ vars.FOD_BASE_URL || 'https://api.ams.fortify.com' }}
          fod-client-id: ${{ secrets.FOD_CLIENT_ID }}
          fod-client-secret: ${{ secrets.FOD_CLIENT_SECRET }}
          fod-tenant: ${{ secrets.FOD_TENANT }}
          fod-user: ${{ secrets.FOD_USER }}
          fod-password: ${{ secrets.FOD_PASSWORD || secrets.FOD_PAT }}
          fod-oauth-scope: ${{ vars.FOD_OAUTH_SCOPE || 'api-tenant' }}
          fod-release-id: ${{ needs.fortify-fod.outputs.release_id }}
          fod-severity-strings: ${{ vars.FOD_SEVERITY_STRINGS || 'critical' }}
          fod-pr-grouping: ${{ vars.FOD_PR_GROUPING || 'category' }}
          fod-verify-ssl: ${{ vars.FOD_VERIFY_SSL || 'true' }}
          remediation-validate-command: ${{ vars.REMEDIATION_VALIDATE_COMMAND || 'dotnet build ./dvcsharp-core-api.csproj --configuration Release' }}
          setup-java: 'true'
          java-version: '8'
          java-distribution: temurin
          github-token: ${{ github.token }}
          github-repository: ${{ github.repository }}
          pr-number: ${{ needs.resolve-pr-context.outputs.pr_number }}
          github-base-ref: ${{ needs.resolve-pr-context.outputs.base_ref }}
